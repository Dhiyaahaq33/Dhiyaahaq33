name: Update profile stats

on:
  schedule:
    - cron: '30 4 * * *'   # ~11:30 WIB daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.STATS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Refresh Lines of Code + Contributions
        run: bash scripts/update-stats.sh

      - name: Commit and push if changed
        run: |
          git config user.name "Dhiyaahaq33"
          git config user.email "139051782+Dhiyaahaq33@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-refresh LOC and contributions"
          git push
